version: "3.9"

services:

  db:
    image: postgres:16

    container_name: postgres

    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tapakila_db

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

  app:

    build: .

    container_name: tapakila

    depends_on:
      - db

    ports:
      - "3000:3000"

    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/tapakila_db

volumes:
  postgres-data: